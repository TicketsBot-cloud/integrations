name = "fivem"
main = "index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability.logs]
enabled = true

[vars]
SENTRY_DSN = "https://f7d1718105706ab2e6f4402d4bc7b802@sentry.tkts.bot/13"

[[kv_namespaces]]
binding = "INTEGRATION_CACHE"
id = "fbdf23642f6a40d0b5876abf3265910d"

# Secrets (set via `wrangler secret put <NAME>`):
#   FIVEM_AUTH_KEY — static guard token; callers must send this in the Authorization header
#
# Integration request headers (configured in the dashboard):
#   Authorization: <FIVEM_AUTH_KEY value>      (static, proves the caller is TicketsBot)
#   X-FiveM-Server-Id: %fivem_server_id%       (per-guild secret; guild admin provides their FiveM server ID on activation)
