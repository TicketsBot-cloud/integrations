name = "bloxlink"
main = "index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability.logs]
enabled = true

[vars]
SENTRY_DSN = "https://f7d1718105706ab2e6f4402d4bc7b802@sentry.tkts.bot/13"

[[kv_namespaces]]
id = "fbdf23642f6a40d0b5876abf3265910d"
binding = "INTEGRATION_CACHE"

# Secrets (set via `wrangler secret put <NAME>`):
#   BLOXLINK_AUTH_KEY — static guard token; callers must send this in the Authorization header
#
# Integration request headers (configured in the dashboard):
#   Authorization: <BLOXLINK_AUTH_KEY value>   (static, proves the caller is TicketsBot)
#   X-Bloxlink-Api-Key: %bloxlink_api_key%     (per-guild secret; guild admin provides their Bloxlink API key on activation)
